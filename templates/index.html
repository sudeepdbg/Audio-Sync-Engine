<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Sync Engine Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; padding: 2rem; color: #1e293b; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 2rem; margin-bottom: 2rem; }
        .upload-section { display: flex; gap: 2rem; margin-bottom: 2rem; }
        .upload-box { flex: 1; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 16px; padding: 1.5rem; text-align: center; }
        .file-input-label { display: inline-block; background: #2563eb; color: white; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        input[type="file"] { display: none; }
        .result-item { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 2rem; margin-top: 2rem; }
        .status-badge { float: right; padding: 0.4rem 1rem; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-review { background: #fee2e2; color: #991b1b; }
        .summary-bar { background: #f0f9ff; border-left: 4px solid #0ea5e9; padding: 1rem; margin: 1rem 0; color: #0369a1; border-radius: 4px; }
        .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 1.5rem 0; }
        .metric-card { background: #f8fafc; padding: 1.2rem; border-radius: 12px; border: 1px solid #e2e8f0; }
        .metric-label { font-size: 0.7rem; text-transform: uppercase; color: #64748b; font-weight: bold; }
        .metric-value { font-size: 1.2rem; font-weight: 800; margin-top: 4px; }
        .prop-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        .prop-table th, .prop-table td { padding: 10px; border: 1px solid #e2e8f0; text-align: left; }
        .prop-table th { background: #f8fafc; color: #64748b; }
        .waveform-img { width: 100%; border-radius: 12px; margin-top: 1rem; }
        .primary-btn { background: #2563eb; color: white; border: none; padding: 0.8rem 2rem; border-radius: 40px; cursor: pointer; font-weight: bold; }
        #loading { display: none; margin-right: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎧 Sync Engine</h1>
            <div class="upload-section">
                <div class="upload-box">
                    <h3>📌 Master</h3>
                    <label for="refFile" class="file-input-label">Select Master</label>
                    <input type="file" id="refFile">
                    <div id="refName" style="font-size: 0.8rem; margin-top: 8px;"></div>
                </div>
                <div class="upload-box">
                    <h3>🔁 Dubs</h3>
                    <label for="compFiles" class="file-input-label">Select Dubs</label>
                    <input type="file" id="compFiles" multiple>
                    <div id="compCount" style="font-size: 0.8rem; margin-top: 8px;"></div>
                </div>
            </div>
            <div style="text-align: right;">
                <span id="loading">Processing...</span>
                <button class="primary-btn" onclick="uploadFiles()">Start Analysis</button>
            </div>
        </div>
        <div id="results"></div>
    </div>

    <script>
        document.getElementById('refFile').onchange = e => document.getElementById('refName').innerText = e.target.files[0].name;
        document.getElementById('compFiles').onchange = e => document.getElementById('compCount').innerText = `${e.target.files.length} files`;

        async function uploadFiles() {
            const formData = new FormData();
            formData.append('reference', document.getElementById('refFile').files[0]);
            for(let f of document.getElementById('compFiles').files) formData.append('comparison[]', f);
            
            document.getElementById('loading').style.display = 'inline';
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById('loading').style.display = 'none';
            
            let html = `<h2>Master: ${data.reference}</h2>`;
            data.results.forEach(r => {
                html += `
                <div class="result-item">
                    <span class="status-badge ${r.needs_review ? 'status-review' : 'status-ok'}">${r.needs_review ? '⚠️ REVIEW' : '✅ PASSED'}</span>
                    <h3>${r.filename}</h3>
                    <div class="summary-bar">${r.status_summary}</div>
                    
                    <div class="metric-grid">
                        <div class="metric-card"><div class="metric-label">Start Offset</div><div class="metric-value">${r.offset_ms}ms</div></div>
                        <div class="metric-card"><div class="metric-label">Sync Drift</div><div class="metric-value" style="color:${r.drift_ms > 30 ? 'red':'green'}">${r.drift_ms}ms</div></div>
                        <div class="metric-card"><div class="metric-label">DNA Match</div><div class="metric-value">${r.match_confidence}%</div></div>
                        <div class="metric-card">
                            <div class="metric-label">Audio Quality</div>
                            <div class="metric-value">${r.quality.label}</div>
                            <div style="font-size:0.7rem; color:#64748b;">${r.quality.lufs} | ${r.quality.peak}</div>
                        </div>
                    </div>

                    <table class="prop-table">
                        <tr><th>Property</th><th>Master</th><th>Dub</th></tr>
                        <tr><td>Sample Rate</td><td>${r.ref_meta.sr}</td><td>${r.comp_meta.sr}</td></tr>
                        <tr><td>Channels</td><td>${r.ref_meta.channels}</td><td>${r.comp_meta.channels}</td></tr>
                        <tr><td>Bit Depth</td><td>${r.ref_meta.bit_depth}</td><td>${r.comp_meta.bit_depth}</td></tr>
                        <tr><td>Duration</td><td>${r.ref_meta.duration_str}</td><td>${r.comp_meta.duration_str}</td></tr>
                    </table>
                    <img class="waveform-img" src="data:image/png;base64,${r.visual}">
                </div>`;
            });
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
