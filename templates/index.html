<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Engine Pro | QC Dashboard</title>
    <style>
        :root { --brand: #2563eb; --bg: #f8fafc; --text: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; padding: 2rem; color: var(--text); line-height: 1.5; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        
        /* Metrics Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 1.5rem 0; }
        .stat-item { background: var(--bg); padding: 1.25rem; border-radius: 12px; text-align: center; border: 1px solid #f1f5f9; }
        .stat-label { color: #64748b; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.1rem; font-weight: 800; color: var(--text); }

        /* Technical Table & Collapsible UI */
        .details-btn { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; margin-bottom: 1.5rem; transition: 0.2s; }
        .details-btn:hover { background: #e2e8f0; }
        .meta-table { width: 100%; border-collapse: collapse; display: none; margin-top: 10px; background: white; }
        .meta-table th, .meta-table td { border: 1px solid #e2e8f0; padding: 12px; font-size: 13px; text-align: left; }
        .meta-table th { background: #f8fafc; color: #64748b; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .mismatch-alert { background: #fee2e2; color: #b91c1c; font-weight: 800; }

        /* Professional Visuals */
        .waveform-wrap { background: #0f172a; border-radius: 16px; overflow: hidden; border: 1px solid #1e293b; margin-top: 1rem; }
        .waveform-img { width: 100%; display: block; }
        
        .upload-row { display: flex; gap: 1rem; align-items: center; margin-top: 2rem; }
        .primary-btn { background: var(--brand); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: 700; cursor: pointer; }
        .secondary-btn { background: white; color: #64748b; border: 1px solid #cbd5e1; padding: 12px 25px; border-radius: 30px; font-weight: 600; cursor: pointer; }
        
        #loader { display: none; font-weight: 800; color: var(--brand); align-items: center; gap: 8px; }
        .spin { width: 16px; height: 16px; border: 3px solid #bfdbfe; border-top-color: var(--brand); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 style="font-size: 2.2rem; letter-spacing: -1px;">🎧 Sync Engine <span style="color:var(--brand)">Pro</span></h1>
            <p style="color: #64748b; font-weight: 500;">Broadcast-grade temporal alignment, Phase health, and Channel Mapping QC.</p>
            
            <div class="upload-row">
                <div style="flex:1"><strong>Master:</strong> <input type="file" id="refFile"></div>
                <div style="flex:1"><strong>Dubs:</strong> <input type="file" id="compFiles" multiple></div>
                <div id="loader"><div class="spin"></div> Analysing...</div>
                <button class="secondary-btn" onclick="wipeCache()">Clear Cache</button>
                <button class="primary-btn" onclick="runAnalysis()">Run QC Analysis</button>
            </div>
        </div>
        <div id="results"></div>
    </div>

    <script>
        async function wipeCache() { if(confirm("Clear all volatile data?")) await fetch('/wipe', {method:'POST'}); location.reload(); }

        async function runAnalysis() {
            const fd = new FormData();
            const ref = document.getElementById('refFile').files[0];
            const comps = document.getElementById('compFiles').files;
            if(!ref || comps.length === 0) return alert("Select files.");

            fd.append('reference', ref);
            for(let f of comps) fd.append('comparison[]', f);

            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch('/upload', { method: 'POST', body: fd });
                const data = await res.json();
                render(data);
            } catch(e) { alert("Server Error"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function render(data) {
            let html = `<h2 style="margin: 2rem 0;">Master Reference: <span style="color:var(--brand)">${data.reference}</span></h2>`;
            data.results.forEach((r, i) => {
                html += `
                <div class="card">
                    <h3 style="margin-bottom:1.5rem">${r.filename}</h3>
                    <div class="stats-grid">
                        <div class="stat-item"><div class="stat-label">Start Offset</div><div class="stat-value">${r.offset_ms}ms</div></div>
                        <div class="stat-item"><div class="stat-label">DNA Match</div><div class="stat-value">${r.dna_match}%</div></div>
                        <div class="stat-item"><div class="stat-label">Loudness</div><div class="stat-value">${r.levels.lufs}</div></div>
                        <div class="stat-item"><div class="stat-label">Phase</div><div class="stat-value">${r.phase}</div></div>
                    </div>

                    <button class="details-btn" onclick="const t=document.getElementById('t-${i}'); t.style.display=t.style.display==='table'?'none':'table'">+ Expand Technical Specs</button>
                    
                    <table class="meta-table" id="t-${i}">
                        <tr><th>Technical Property</th><th>Master Reference</th><th>Comparison Dub</th></tr>
                        <tr><td>Bit Depth</td><td>${r.ref_meta.bit_depth}</td><td>${r.comp_meta.bit_depth}</td></tr>
                        <tr><td>Sample Rate</td><td>${r.ref_meta.sr}</td><td>${r.comp_meta.sr}</td></tr>
                        <tr class="${r.chan_mismatch ? 'mismatch-alert' : ''}">
                            <td>Channel Mapping</td>
                            <td>${r.ref_meta.channel_label}</td>
                            <td>${r.comp_meta.channel_label} ${r.chan_mismatch ? '⚠️ MISMATCH' : ''}</td>
                        </tr>
                        <tr><td>Peak Level</td><td>N/A</td><td>${r.levels.peak}</td></tr>
                    </table>

                    <div class="waveform-wrap"><img class="waveform-img" src="data:image/png;base64,${r.visual}"></div>
                </div>`;
            });
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
