<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Engine Pro | Broadcast QC</title>
    <style>
        :root { --brand: #2563eb; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; padding: 2rem; color: #1e293b; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .upload-box { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 2rem; border-radius: 16px; text-align: center; }
        
        .primary-btn { background: var(--brand); color: white; border: none; padding: 1rem 2.5rem; border-radius: 40px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .primary-btn:disabled { opacity: 0.5; }

        .mode-toggle { display: block; margin: 1rem 0; padding: 1rem; background: #eff6ff; border-radius: 12px; border: 1px solid #bae6fd; font-weight: 600; }

        .result-item { background: white; border-radius: 16px; padding: 2rem; margin-top: 2rem; border: 1px solid #e2e8f0; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 1.5rem 0; }
        .stat-card { background: #f8fafc; padding: 1.25rem; border-radius: 12px; border: 1px solid #f1f5f9; text-align: center; }
        .stat-label { color: #64748b; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .stat-value { color: #1e293b; font-size: 1.1rem; font-weight: 800; }

        .meta-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .meta-table th { text-align: left; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; font-size: 0.8rem; }
        .meta-table td { padding: 10px; border: 1px solid #e2e8f0; font-size: 0.85rem; }

        .waveform-img { width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 1.5rem; background: white; }
        .status-badge { float: right; padding: 0.5rem 1.2rem; border-radius: 30px; font-size: 0.8rem; font-weight: 700; }
        .pass { background: #dcfce7; color: #166534; }
        .fail { background: #fee2e2; color: #991b1b; }

        #loading { display: none; align-items: center; gap: 10px; color: var(--brand); font-weight: 700; }
        .spinner { width: 20px; height: 20px; border: 3px solid #bfdbfe; border-top-color: var(--brand); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎧 Sync Engine <span style="color: var(--brand)">Pro</span></h1>
            <p style="color: #64748b; margin-bottom: 2rem;">Professional Temporal Alignment & Broadcast Quality Control</p>

            <div class="upload-section">
                <div class="upload-box">
                    <strong>📌 Master Reference</strong><br>
                    <input type="file" id="refFile" style="margin-top: 15px;">
                </div>
                <div class="upload-box">
                    <strong>🔁 Comparison Dubs</strong><br>
                    <input type="file" id="compFiles" multiple style="margin-top: 15px;">
                </div>
            </div>

            <label class="mode-toggle">
                <input type="checkbox" id="deepAnalysis"> 🚀 Neural Vocal DNA Mode (Dialogue Isolation)
            </label>

            <div style="display: flex; justify-content: flex-end; align-items: center; gap: 20px;">
                <div id="loading"><div class="spinner"></div> Extracting DNA...</div>
                <button class="primary-btn" id="runBtn" onclick="uploadFiles()">Run Analysis</button>
            </div>
        </div>
        <div id="results"></div>
    </div>

    <script>
        async function uploadFiles() {
            const fd = new FormData();
            const ref = document.getElementById('refFile').files[0];
            const comps = document.getElementById('compFiles').files;
            if(!ref || comps.length === 0) return alert("Select files first.");

            fd.append('reference', ref);
            fd.append('deepAnalysis', document.getElementById('deepAnalysis').checked);
            for (let f of comps) fd.append('comparison[]', f);

            document.getElementById('loading').style.display = 'flex';
            document.getElementById('runBtn').disabled = true;

            try {
                const res = await fetch('/upload', { method: 'POST', body: fd });
                const data = await res.json();
                renderResults(data);
            } catch (e) {
                alert("Server error. Check console.");
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('runBtn').disabled = false;
            }
        }

        function renderResults(data) {
            let html = `<h2 style="margin: 2rem 0;">Analysis for: ${data.reference}</h2>`;
            data.results.forEach(r => {
                html += `
                <div class="result-item">
                    <span class="status-badge ${r.needs_review ? 'fail' : 'pass'}">${r.needs_review ? '🚩 FLAG' : '✅ PASS'}</span>
                    <h3>${r.filename}</h3>
                    
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-label">Start Offset</div><div class="stat-value">${r.offset_ms}ms</div></div>
                        <div class="stat-card"><div class="stat-label">Total Drift</div><div class="stat-value">${r.drift_ms}ms</div></div>
                        <div class="stat-card"><div class="stat-label">Loudness</div><div class="stat-value">${r.quality.lufs}</div></div>
                        <div class="stat-card"><div class="stat-label">Peak</div><div class="stat-value">${r.quality.peak}</div></div>
                    </div>

                    <table class="meta-table">
                        <tr><th>Tech Spec</th><th>Master</th><th>Comparison</th></tr>
                        <tr><td>Bit Depth</td><td>${r.ref_meta.bit_depth}</td><td>${r.comp_meta.bit_depth}</td></tr>
                        <tr><td>Sample Rate</td><td>${r.ref_meta.sr}</td><td>${r.comp_meta.sr}</td></tr>
                    </table>

                    <img class="waveform-img" src="data:image/png;base64,${r.visual}">
                </div>`;
            });
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
