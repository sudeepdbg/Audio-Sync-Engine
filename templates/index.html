<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Engine Pro | Quality Control</title>
    <style>
        :root { --brand: #0f172a; --accent: #2563eb; --danger: #e11d48; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: #f8fafc; padding: 40px; color: var(--brand); }
        .container { max-width: 1100px; margin: auto; }
        .glass-card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 4px 25px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; margin-bottom: 30px; }
        
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .box { border: 2px dashed #cbd5e1; border-radius: 16px; padding: 30px; text-align: center; background: #fdfdfd; }
        
        .result-item { background: white; border-radius: 20px; padding: 30px; border: 1px solid #e2e8f0; margin-bottom: 25px; position: relative; overflow: hidden; }
        .badge { position: absolute; top: 0; left: 0; width: 6px; height: 100%; }
        .pass-badge { background: var(--success); } .fail-badge { background: var(--danger); }

        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #f1f5f9; text-align: center; }
        .stat-val { font-size: 22px; font-weight: 800; display: block; }
        .stat-lbl { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

        .waveform { width: 100%; height: 70px; background: #0f172a; border-radius: 10px; margin-top: 20px; padding: 8px; }
        .tech-specs { font-size: 12px; color: #64748b; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; }
        .btn { background: var(--brand); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1>Sync Engine <span style="color:var(--accent)">Pro</span></h1>
            <p>Broadcaster Compliance & Professional Audio Verification</p>
            
            <div class="upload-grid">
                <div class="box">
                    <h3>Master</h3>
                    <input type="file" id="mIn" hidden onchange="document.getElementById('mN').innerText=this.files[0].name">
                    <button class="btn" style="background:#64748b" onclick="document.getElementById('mIn').click()">Select Master</button>
                    <div id="mN" style="margin-top:10px; font-size:12px"></div>
                </div>
                <div class="box">
                    <h3>Dubs</h3>
                    <input type="file" id="dIn" multiple hidden onchange="document.getElementById('dN').innerText=this.files.length + ' files selected'">
                    <button class="btn" style="background:#64748b" onclick="document.getElementById('dIn').click()">Select Dubs</button>
                    <div id="dN" style="margin-top:10px; font-size:12px"></div>
                </div>
            </div>
            
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <div>
                    <label style="font-size:12px; font-weight:800">FRAME RATE:</label>
                    <select id="fps" style="padding:8px; border-radius:6px; border:1px solid #cbd5e1">
                        <option value="23.976">23.976</option>
                        <option value="24" selected>24.00</option>
                        <option value="25">25.00</option>
                        <option value="29.97">29.97</option>
                    </select>
                </div>
                <button class="btn" onclick="analyze()">Start Professional QC</button>
            </div>
        </div>

        <div id="output"></div>
    </div>

    <script>
        async function analyze() {
            const fd = new FormData();
            fd.append('reference', document.getElementById('mIn').files[0]);
            fd.append('fps', document.getElementById('fps').value);
            for(let f of document.getElementById('dIn').files) fd.append('comparison[]', f);

            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();

            let html = "";
            data.results.forEach(r => {
                html += `
                <div class="result-item">
                    <div class="badge ${r.passed ? 'pass-badge' : 'fail-badge'}"></div>
                    <h2 style="font-size:1.2rem">${r.filename}</h2>
                    <p style="color: #64748b; font-size:13px; margin-top:5px">${r.summary}</p>
                    
                    <div class="dashboard-grid">
                        <div class="stat-card"><span class="stat-lbl">Timecode</span><span class="stat-val">${r.timecode}</span></div>
                        <div class="stat-card"><span class="stat-lbl">Loudness</span><span class="stat-val">${r.lufs}</span></div>
                        <div class="stat-card"><span class="stat-lbl">Lip-Flap Sync</span><span class="stat-val">${r.lip_flap}%</span></div>
                        <div class="stat-card"><span class="stat-lbl">Phase Corr.</span><span class="stat-val" style="color:${r.phase < 0 ? 'var(--danger)' : 'inherit'}">${r.phase}</span></div>
                    </div>

                    <img class="waveform" src="data:image/png;base64,${r.visual}">

                    <div class="tech-specs">
                        <div><strong>Master Target:</strong> ${data.master_lufs}</div>
                        <div><strong>Format:</strong> ${r.meta.sr} | ${r.meta.bit_depth} | ${r.meta.channels}</div>
                    </div>
                </div>`;
            });
            document.getElementById('output').innerHTML = html;
        }
    </script>
</body>
</html>
