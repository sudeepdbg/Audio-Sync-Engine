<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Engine Pro | Quality Control</title>
    <style>
        :root { --primary: #2563eb; --fail: #e11d48; --pass: #10b981; }
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; padding: 40px; color: #1e293b; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .upload-box { border: 2px dashed #cbd5e1; padding: 30px; border-radius: 12px; text-align: center; background: #f8fafc; }
        
        .result-item { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 25px; }
        .status-badge { float: right; padding: 6px 16px; border-radius: 20px; font-weight: 800; font-size: 12px; text-transform: uppercase; }
        .status-pass { background: #dcfce7; color: #166534; }
        .status-review { background: #fee2e2; color: #991b1b; }
        
        .summary-banner { background: #f0f9ff; border-left: 5px solid #0ea5e9; padding: 15px; border-radius: 8px; margin: 15px 0; }
        
        .impact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .impact-card { background: #f8fafc; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #f1f5f9; }
        .val { font-size: 26px; font-weight: 900; }
        .lbl { font-size: 10px; font-weight: 800; color: #64748b; letter-spacing: 1px; }

        .meta-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        .meta-table th { text-align: left; padding: 8px; background: #f1f5f9; color: #64748b; }
        .meta-table td { padding: 8px; border-bottom: 1px solid #f1f5f9; }

        .explainer { background: #fffbeb; border: 1px solid #fef3c7; padding: 15px; border-radius: 8px; font-size: 13px; margin-top: 20px; color: #92400e; }
        .waveform { width: 100%; background: #0f172a; border-radius: 10px; margin-top: 15px; padding: 5px; }
        .btn { background: var(--primary); color: white; padding: 12px 30px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎙️ Sync Engine Pro</h1>
            <p style="color:#64748b">Complete technical verification and emotional texture analysis.</p>
            <div class="upload-grid">
                <div class="upload-box">
                    <h3>Master</h3>
                    <input type="file" id="mIn" style="display:none" onchange="uL('mIn','mN')">
                    <button class="btn" onclick="document.getElementById('mIn').click()">Upload Master</button>
                    <div id="mN" style="margin-top:10px; font-size:12px;"></div>
                </div>
                <div class="upload-box">
                    <h3>Dubs</h3>
                    <input type="file" id="dIn" multiple style="display:none" onchange="uL('dIn','dN')">
                    <button class="btn" onclick="document.getElementById('dIn').click()">Upload Dubs</button>
                    <div id="dN" style="margin-top:10px; font-size:12px;"></div>
                </div>
            </div>
            <div style="text-align: right;"><button class="btn" onclick="run()">Start Analysis</button></div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        function uL(i, t) { const f = document.getElementById(i).files; document.getElementById(t).innerText = f.length > 1 ? f.length + " files" : f[0].name; }

        async function run() {
            const fd = new FormData();
            fd.append('reference', document.getElementById('mIn').files[0]);
            for(let f of document.getElementById('dIn').files) fd.append('comparison[]', f);

            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();

            let html = "";
            data.results.forEach(r => {
                html += `
                <div class="result-item">
                    <span class="status-badge ${r.needs_review ? 'status-review' : 'status-pass'}">${r.needs_review ? 'Review' : 'Passed'}</span>
                    <h2>${r.filename}</h2>
                    
                    <div class="summary-banner"><strong>Verdict:</strong> ${r.summary}</div>

                    <div class="impact-grid">
                        <div class="impact-card"><div class="lbl">TEMPORAL OFFSET</div><div class="val">${r.offset_ms}ms</div></div>
                        <div class="impact-card"><div class="lbl">LIP-FLAP SYNC</div><div class="val">${r.lip_flap_sync}%</div></div>
                        <div class="impact-card"><div class="lbl">TONE LOCK</div><div class="val">${r.tone_lock}%</div></div>
                    </div>

                    <table class="meta-table">
                        <tr><th>Property</th><th>Master Reference</th><th>Current Dub</th></tr>
                        <tr><td>Sample Rate</td><td>${r.ref_meta.sr}</td><td>${r.comp_meta.sr}</td></tr>
                        <tr><td>Bit Depth</td><td>${r.ref_meta.bit_depth}</td><td>${r.comp_meta.bit_depth}</td></tr>
                        <tr><td>Channels</td><td>${r.ref_meta.channels}</td><td>${r.comp_meta.channels}</td></tr>
                        <tr><td>Loudness</td><td>${r.ref_meta.loudness}</td><td>${r.comp_meta.loudness}</td></tr>
                        <tr><td>Duration</td><td>${r.ref_meta.duration_str}</td><td>${r.comp_meta.duration_str}</td></tr>
                    </table>

                    <img class="waveform" src="data:image/png;base64,${r.visual}">

                    <div class="explainer">
                        <strong>Metric Meanings:</strong><br>
                        • <strong>Lip-Flap Sync:</strong> Measures speech density similarity. A high score means the dub actor matched the Master's syllable pace.<br>
                        • <strong>Tone Lock:</strong> Analyzes spectral texture. High scores ensure the "emotional vibe" and acoustic environment match the original.
                    </div>
                </div>`;
            });
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
