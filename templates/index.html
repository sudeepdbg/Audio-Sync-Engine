<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Engine Pro | QC Dashboard</title>
    <style>
        :root { --brand: #2563eb; --danger: #ef4444; --success: #10b981; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: #f1f5f9; padding: 2rem; color: #1e293b; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .upload-box { background: var(--bg); border: 2px dashed #cbd5e1; padding: 2rem; border-radius: 16px; text-align: center; }
        
        .mode-banner { background: #eff6ff; border: 1px solid #bae6fd; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        
        .primary-btn { background: var(--brand); color: white; border: none; padding: 12px 30px; border-radius: 40px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .secondary-btn { background: white; color: #64748b; border: 1px solid #e2e8f0; padding: 12px 25px; border-radius: 40px; font-weight: 700; cursor: pointer; }

        .result-card { background: white; border-radius: 16px; padding: 2rem; margin-top: 2rem; border: 1px solid #e2e8f0; position: relative; }
        .status-badge { float: right; padding: 6px 16px; border-radius: 30px; font-size: 0.75rem; font-weight: 800; }
        .pass { background: #dcfce7; color: #166534; }
        .fail { background: #fee2e2; color: #991b1b; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 1.5rem 0; }
        .stat-item { background: #f8fafc; padding: 1.25rem; border-radius: 12px; text-align: center; border: 1px solid #f1f5f9; }
        .stat-label { color: #64748b; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { color: #1e293b; font-size: 1.1rem; font-weight: 800; }

        .expand-btn { background: #f1f5f9; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 700; margin-bottom: 1rem; }
        .meta-table { width: 100%; border-collapse: collapse; display: none; margin-top: 10px; }
        .meta-table th, .meta-table td { border: 1px solid #e2e8f0; padding: 12px; font-size: 13px; text-align: left; }
        .meta-table th { background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .mismatch-row { background: #fff1f2; color: #be123c; font-weight: 700; }

        .waveform-wrap { background: #0f172a; border-radius: 12px; margin-top: 1.5rem; overflow: hidden; border: 1px solid #334155; }
        .waveform-img { width: 100%; display: block; }

        #loader { display: none; font-weight: 700; color: var(--brand); align-items: center; gap: 10px; }
        .spin { width: 18px; height: 18px; border: 3px solid #bfdbfe; border-top-color: var(--brand); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 style="font-size: 2rem; letter-spacing: -1px;">🎧 Sync Engine <span style="color:var(--brand)">Pro</span></h1>
            <p style="color:#64748b; margin-bottom: 2rem;">Professional Broadcast Alignment & Channel Mapping QC</p>

            <div class="upload-grid">
                <div class="upload-box">
                    <strong>📌 Reference Master</strong><br>
                    <input type="file" id="refFile" style="margin-top:15px">
                </div>
                <div class="upload-box">
                    <strong>🔁 Comparison Dubs</strong><br>
                    <input type="file" id="compFiles" multiple style="margin-top:15px">
                </div>
            </div>

            <div class="mode-banner">
                <input type="checkbox" id="deepAnalysis" style="width:18px; height:18px;">
                🚀 Neural Vocal DNA Mode (Isolates dialogue for 100% sync accuracy)
            </div>

            <div style="display: flex; justify-content: flex-end; align-items: center; gap: 1.5rem;">
                <div id="loader"><div class="spin"></div> Extracting DNA...</div>
                <button class="secondary-btn" onclick="wipeCache()">Wipe Cache</button>
                <button class="primary-btn" id="runBtn" onclick="runQC()">Run QC Analysis</button>
            </div>
        </div>
        <div id="results"></div>
    </div>

    <script>
        async function wipeCache() {
            if(!confirm("Clear all session data?")) return;
            const res = await fetch('/wipe', {method:'POST'});
            const d = await res.json(); alert(d.status); location.reload();
        }

        async function runQC() {
            const fd = new FormData();
            const ref = document.getElementById('refFile').files[0];
            const comps = document.getElementById('compFiles').files;
            if(!ref || comps.length === 0) return alert("Select files.");

            fd.append('reference', ref);
            fd.append('deepAnalysis', document.getElementById('deepAnalysis').checked);
            for(let f of comps) fd.append('comparison[]', f);

            document.getElementById('loader').style.display = 'flex';
            document.getElementById('runBtn').disabled = true;

            try {
                const res = await fetch('/upload', {method:'POST', body:fd});
                const data = await res.json();
                renderResults(data);
            } catch(e) { alert("Server error."); }
            finally {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('runBtn').disabled = false;
            }
        }

        function renderResults(data) {
            let html = `<h2 style="margin: 2rem 0;">Master: <span style="color:var(--brand)">${data.reference}</span></h2>`;
            data.results.forEach((r, i) => {
                html += `
                <div class="result-card">
                    <span class="status-badge ${r.needs_review ? 'fail' : 'pass'}">${r.needs_review ? '🚩 FLAG' : '✅ PASS'}</span>
                    <h3 style="margin-bottom:1.5rem">${r.filename}</h3>

                    <div class="stats-grid">
                        <div class="stat-item"><div class="stat-label">Start Offset</div><div class="stat-value">${r.offset_ms}ms</div></div>
                        <div class="stat-item"><div class="stat-label">Total Drift</div><div class="stat-value">${r.drift_ms}ms</div></div>
                        <div class="stat-item"><div class="stat-label">DNA Match</div><div class="stat-value">${r.dna_match}%</div></div>
                        <div class="stat-item"><div class="stat-label">Loudness</div><div class="stat-value">${r.levels.lufs}</div></div>
                    </div>

                    <button class="expand-btn" onclick="const t=document.getElementById('t-${i}'); t.style.display=t.style.display==='table'?'none':'table'">+ Expand Technical Specs</button>
                    
                    <table class="meta-table" id="t-${i}">
                        <tr><th>Technical Property</th><th>Master Reference</th><th>Comparison Dub</th></tr>
                        <tr><td>Format / Subtype</td><td>${r.ref_meta.format}</td><td>${r.comp_meta.format}</td></tr>
                        <tr><td>Bit Depth</td><td>${r.ref_meta.bit_depth}</td><td>${r.comp_meta.bit_depth}</td></tr>
                        <tr><td>Sample Rate</td><td>${r.ref_meta.sr}</td><td>${r.comp_meta.sr}</td></tr>
                        <tr class="${r.chan_mismatch ? 'mismatch-row' : ''}">
                            <td>Channel Mapping</td>
                            <td>${r.ref_meta.channel_label}</td>
                            <td>${r.comp_meta.channel_label} ${r.chan_mismatch ? '(MISMATCH FLAG)' : ''}</td>
                        </tr>
                        <tr><td>Peak Level</td><td>N/A</td><td>${r.levels.peak}</td></tr>
                    </table>

                    <div class="waveform-wrap">
                        <img class="waveform-img" src="data:image/png;base64,${r.visual}">
                    </div>
                </div>`;
            });
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
