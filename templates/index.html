<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Sync Engine Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: #f1f5f9; display: flex; justify-content: center; padding: 2rem; min-height: 100vh; color: #1e293b; }
        .container { max-width: 1100px; width: 100%; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 2.5rem; margin-bottom: 2rem; }
        h1 { font-size: 2.2rem; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        .subtitle { color: #64748b; margin-bottom: 2.5rem; font-size: 1.1rem; }
        
        .upload-section { display: flex; flex-wrap: wrap; gap: 2rem; }
        .upload-box { flex: 1 1 300px; background: #f8fafc; border-radius: 16px; padding: 2rem; border: 2px dashed #cbd5e1; text-align: center; }
        .file-input-label { display: inline-block; background: white; border: 1px solid #cbd5e1; border-radius: 40px; padding: 0.7rem 1.5rem; cursor: pointer; margin-top: 10px; font-weight: 500; font-size: 0.9rem; }
        input[type="file"] { display: none; }
        
        /* Deep Analysis Switch */
        .deep-mode-container { margin: 1.5rem 0; padding: 1.25rem; background: #f0f9ff; border-radius: 12px; border: 1px solid #bae6fd; display: flex; align-items: flex-start; gap: 12px; }
        #deepAnalysis { width: 20px; height: 20px; cursor: pointer; margin-top: 3px; }
        .deep-text h4 { color: #0369a1; font-size: 0.95rem; margin-bottom: 4px; }
        .deep-text p { font-size: 0.8rem; color: #0c4a6e; line-height: 1.4; }

        .primary-btn { background: #2563eb; color: white; border: none; border-radius: 40px; padding: 0.9rem 2.5rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .primary-btn:hover { background: #1d4ed8; }
        .primary-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .secondary-btn { background: white; color: #64748b; border: 1px solid #e2e8f0; border-radius: 40px; padding: 0.9rem 1.8rem; font-weight: 600; cursor: pointer; }

        .result-item { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 2rem; margin-top: 2rem; position: relative; }
        .status-badge { padding: 0.5rem 1.2rem; border-radius: 30px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; float: right; }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-review { background: #fee2e2; color: #991b1b; }
        
        .summary-box { background: #f0f9ff; border-left: 4px solid #0ea5e9; padding: 1.25rem; border-radius: 8px; margin-bottom: 1.5rem; clear: both; }
        .summary-text { font-size: 1rem; color: #0c4a6e; font-weight: 500; }

        .prop-table { width: 100%; border-collapse: collapse; margin: 1rem 0 1.5rem 0; font-size: 0.85rem; display: none; }
        .prop-table th { background: #f8fafc; color: #64748b; text-align: left; padding: 8px 12px; border: 1px solid #e2e8f0; }
        .prop-table td { padding: 8px 12px; border: 1px solid #e2e8f0; }
        .mismatch { color: #e11d48; font-weight: 700; background: #fff1f2; }
        .details-toggle { background: none; border: none; color: #2563eb; cursor: pointer; font-size: 0.8rem; font-weight: 600; text-decoration: underline; margin-bottom: 1rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
        .stat-card { background: #f8fafc; padding: 1.25rem; border-radius: 12px; border: 1px solid #f1f5f9; }
        .stat-label { color: #64748b; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 0.5rem; }
        .stat-value { color: #1e293b; font-size: 1.1rem; font-weight: 800; }
        .stat-sub { font-size: 0.7rem; color: #94a3b8; margin-top: 4px; font-weight: 500; }
        
        .waveform-img { width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 10px; }
        .issue-box { background: #fff1f2; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; border: 1px solid #fda4af; }
        .issue-list { margin: 0; color: #be123c; font-size: 0.9rem; }

        #loading { display: none; align-items: center; gap: 10px; color: #2563eb; font-weight: 700; }
        .spinner { width: 18px; height: 18px; border: 3px solid #bfdbfe; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎧 Sync Engine</h1>
            <p class="subtitle">Broadcast temporal alignment and Content DNA verification.</p>
            
            <div class="upload-section">
                <div class="upload-box">
                    <h3>📌 Master</h3>
                    <label for="refFile" class="file-input-label">Select Master</label>
                    <input type="file" id="refFile" accept=".wav,.mp3,.m4a,.flac,.aac,.mp4">
                    <div id="refFileList" style="margin-top: 12px; font-size: 0.85rem; color: #2563eb;"></div>
                </div>
                <div class="upload-box">
                    <h3>🔁 Dubs</h3>
                    <label for="compFiles" class="file-input-label">Select Dubs</label>
                    <input type="file" id="compFiles" multiple accept=".wav,.mp3,.m4a,.flac,.aac,.mp4">
                    <div id="compFileList" style="margin-top: 12px; font-size: 0.85rem; color: #2563eb;"></div>
                </div>
            </div>

            <div class="deep-mode-container">
                <input type="checkbox" id="deepAnalysis">
                <div class="deep-text">
                    <h4>🚀 Neural Vocal Isolation (Vocal DNA Mode)</h4>
                    <p>Use this for comparing a dialogue-only Dub against a full Master. It isolates speech from background music to ensure accurate sync scores.</p>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-top: 1rem; gap: 1rem; align-items: center;">
                <div id="loading"><div class="spinner"></div> Processing Signals...</div>
                <button class="secondary-btn" onclick="clearCache()">🗑 Wipe Cache</button>
                <button class="primary-btn" id="checkBtn" onclick="uploadFiles()">▶ Start Analysis</button>
            </div>
        </div>
        <div id="results" class="card" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('refFile').addEventListener('change', function() { 
            document.getElementById('refFileList').innerText = this.files[0]?.name || ''; 
        });
        document.getElementById('compFiles').addEventListener('change', function() { 
            document.getElementById('compFileList').innerText = `${this.files.length} track(s) loaded`; 
        });

        async function clearCache() {
            if (!confirm("Delete all session fingerprints and neural cache?")) return;
            const res = await fetch('/clear_cache', { method: 'POST' });
            location.reload(); 
        }

        async function uploadFiles() {
            const refInput = document.getElementById('refFile');
            const compInput = document.getElementById('compFiles');
            const deepMode = document.getElementById('deepAnalysis').checked;

            if (!refInput.files.length || !compInput.files.length) return alert('Please select both Master and Dub files.');

            const formData = new FormData();
            formData.append('reference', refInput.files[0]);
            formData.append('deepAnalysis', deepMode);
            for (let f of compInput.files) formData.append('comparison[]', f);

            document.getElementById('loading').style.display = 'flex';
            document.getElementById('checkBtn').disabled = true;
            document.getElementById('results').style.display = 'none';

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                displayResults(data);
            } catch (e) { 
                alert("Analysis failed: " + e.message); 
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('checkBtn').disabled = false;
            }
        }

        function displayResults(data) {
            const container = document.getElementById('results');
            container.style.display = 'block';
            let html = `<h2 style="margin-bottom:2rem;">Master: <span style="color: #2563eb;">${data.reference}</span></h2>`;
            
            data.results.forEach(r => {
                const srMismatch = r.ref_meta.sr !== r.comp_meta.sr ? 'mismatch' : '';
                const chMismatch = r.ref_meta.channels !== r.comp_meta.channels ? 'mismatch' : '';
                
                html += `
                    <div class="result-item">
                        <span class="status-badge ${r.needs_review ? 'status-review' : 'status-ok'}">${r.needs_review ? '⚠️ Review' : '✅ Passed'}</span>
                        <h4 style="margin-bottom: 1rem;">${r.filename} ${r.deep_mode_active ? '<small style="color:#0ea5e9;">[Neural Mode]</small>' : ''}</h4>
                        
                        <div class="summary-box"><p class="summary-text">${r.summary}</p></div>
                        
                        ${r.issues.length > 0 ? `<div class="issue-box"><ul class="issue-list">${r.issues.map(i => `<li>${i}</li>`).join('')}</ul></div>` : ''}
                        
                        <button class="details-toggle" onclick="const t=this.nextElementSibling; t.style.display=t.style.display==='none'?'table':'none'">[±] View Format Details</button>
                        <table class="prop-table">
                            <tr><th>Property</th><th>Master</th><th>Dub</th></tr>
                            <tr><td>Sample Rate</td><td>${r.ref_meta.sr}</td><td class="${srMismatch}">${r.comp_meta.sr}</td></tr>
                            <tr><td>Channels</td><td>${r.ref_meta.channels}</td><td class="${chMismatch}">${r.comp_meta.channels}</td></tr>
                            <tr><td>Bit Depth</td><td>${r.ref_meta.bit_depth}</td><td>${r.comp_meta.bit_depth}</td></tr>
                            <tr><td>Duration</td><td>${r.ref_meta.duration_str}</td><td>${r.comp_meta.duration_str}</td></tr>
                        </table>

                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Start Offset</div>
                                <div class="stat-value">${r.offset_ms}ms</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Sync Drift</div>
                                <div class="stat-value" style="color: ${r.drift_ms > 30 ? '#ef4444' : '#10b981'}">${r.drift_ms}ms</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">DNA Match</div>
                                <div class="stat-value">${r.match_confidence}%</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Audio Quality</div>
                                <div class="stat-value" style="font-size: 0.95rem;">${r.quality.quality_label}</div>
                                <div class="stat-sub">${r.quality.peak_status} | ${r.quality.dynamic_range}</div>
                            </div>
                        </div>
                        
                        <img class="waveform-img" src="data:image/png;base64,${r.visual}">
                    </div>`;
            });
            container.innerHTML = html;
            container.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
