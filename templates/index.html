<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Engine Pro | QA Dashboard</title>
    <style>
        :root { --brand: #0f172a; --accent: #2563eb; --bg: #f8fafc; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--brand); padding: 40px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Dashboard Header */
        .glass-card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .upload-area { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin: 30px 0; }
        .drop-zone { border: 2px dashed #cbd5e1; border-radius: 16px; padding: 40px; text-align: center; transition: 0.2s; background: #fdfdfd; }
        .drop-zone:hover { border-color: var(--accent); background: #f0f7ff; }
        
        /* Metric Dashboard */
        .result-card { background: white; border-radius: 20px; padding: 30px; margin-top: 25px; border: 1px solid #e2e8f0; position: relative; }
        .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 25px 0; }
        .score-box { padding: 20px; border-radius: 16px; text-align: center; background: #f8fafc; border: 1px solid #f1f5f9; }
        .score-val { font-size: 28px; font-weight: 800; display: block; }
        .score-lbl { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

        /* Status colors */
        .status-pill { float: right; padding: 6px 18px; border-radius: 50px; font-size: 12px; font-weight: 800; }
        .bg-pass { background: #dcfce7; color: #15803d; }
        .bg-fail { background: #fee2e2; color: #b91c1c; }

        .details-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 20px; display: none; }
        .details-table th { text-align: left; color: #64748b; padding: 10px; border-bottom: 2px solid #f1f5f9; }
        .details-table td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
        
        .waveform-box { background: #0f172a; border-radius: 12px; padding: 10px; margin-top: 20px; }
        .waveform-img { width: 100%; display: block; opacity: 0.9; }
        
        .btn { background: var(--brand); color: white; border: none; padding: 14px 34px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--accent); transform: translateY(-1px); }
        .text-btn { background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; text-decoration: underline; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1 style="font-size: 2.5rem; letter-spacing: -1.5px;">Sync Engine <span style="color:var(--accent)">Pro</span></h1>
            <p style="color:#64748b">Professional audio alignment and texture verification suite.</p>
            
            <div class="upload-area">
                <div class="drop-zone">
                    <h3 style="margin-bottom:15px">Master File</h3>
                    <input type="file" id="mIn" hidden onchange="lbl('mIn','mN')">
                    <button class="btn" style="background:#64748b" onclick="document.getElementById('mIn').click()">Browse Reference</button>
                    <div id="mN" style="margin-top:10px; font-size:12px; font-weight:600"></div>
                </div>
                <div class="drop-zone">
                    <h3 style="margin-bottom:15px">Dub Samples</h3>
                    <input type="file" id="dIn" multiple hidden onchange="lbl('dIn','dN')">
                    <button class="btn" style="background:#64748b" onclick="document.getElementById('dIn').click()">Browse Dubs</button>
                    <div id="dN" style="margin-top:10px; font-size:12px; font-weight:600"></div>
                </div>
            </div>
            <div style="text-align: right;"><button class="btn" onclick="process()">Analyze Session</button></div>
        </div>

        <div id="output"></div>
    </div>

    <script>
        function lbl(i, t) { const f = document.getElementById(i).files; document.getElementById(t).innerText = f.length > 1 ? `${f.length} files selected` : f[0].name; }

        async function process() {
            const fd = new FormData();
            fd.append('reference', document.getElementById('mIn').files[0]);
            for(let f of document.getElementById('dIn').files) fd.append('comparison[]', f);

            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();

            let html = `<h2 style="margin-bottom:10px">Session: ${data.session}</h2>`;
            data.results.forEach((r, idx) => {
                html += `
                <div class="result-card">
                    <span class="status-pill ${r.passed ? 'bg-pass' : 'bg-fail'}">${r.passed ? 'PASSED' : 'NEEDS REVIEW'}</span>
                    <h3>${r.filename}</h3>
                    
                    <div class="score-grid">
                        <div class="score-box">
                            <span class="score-lbl">Start Offset</span>
                            <span class="score-val" style="color:${Math.abs(r.offset_ms) > 50 ? 'var(--danger)' : 'inherit'}">${r.offset_ms}ms</span>
                        </div>
                        <div class="score-box">
                            <span class="score-lbl">Lip-Flap Sync</span>
                            <span class="score-val">${r.lip_flap}%</span>
                        </div>
                        <div class="score-box">
                            <span class="score-lbl">Tone Lock</span>
                            <span class="score-val">${r.tone_lock}%</span>
                        </div>
                    </div>

                    <div class="waveform-box">
                        <img class="waveform-img" src="data:image/png;base64,${r.visual}">
                    </div>

                    <button class="text-btn" onclick="document.getElementById('meta-${idx}').style.display = 'table'">Show Technical Specs</button>
                    
                    <table class="details-table" id="meta-${idx}">
                        <tr><th>Property</th><th>Master Reference</th><th>Current Dub</th></tr>
                        <tr><td>Sample Rate</td><td>${r.ref_meta.sr}</td><td>${r.comp_meta.sr}</td></tr>
                        <tr><td>Bit Depth</td><td>${r.ref_meta.bit_depth}</td><td>${r.comp_meta.bit_depth}</td></tr>
                        <tr><td>Channels</td><td>${r.ref_meta.channels}</td><td>${r.comp_meta.channels}</td></tr>
                        <tr><td>Loudness</td><td>${r.ref_meta.loudness}</td><td>${r.comp_meta.loudness}</td></tr>
                    </table>
                </div>`;
            });
            document.getElementById('output').innerHTML = html;
        }
    </script>
</body>
</html>
