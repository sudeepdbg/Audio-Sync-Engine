<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Engine Pro | Quality Assurance</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px; }
        .container { max-width: 1100px; margin: auto; }
        .header-card { background: var(--card); border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .drop-zone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 30px; text-align: center; transition: 0.3s; background: #f1f5f9; }
        .drop-zone:hover { border-color: var(--primary); background: #f0f7ff; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37,99,235,0.3); }
        .btn:disabled { background: #94a3b8; }
        
        .result-card { background: white; border-radius: 16px; padding: 25px; margin-top: 20px; border: 1px solid #e2e8f0; position: relative; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .badge { position: absolute; top: 25px; right: 25px; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 800; }
        .badge-pass { background: #dcfce7; color: #166534; }
        .badge-review { background: #fee2e2; color: #991b1b; }
        
        .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .metric-box { background: #f8fafc; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #f1f5f9; }
        .m-label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .m-value { font-size: 24px; font-weight: 900; color: #0f172a; }
        
        .waveform-container { background: #0f172a; border-radius: 12px; padding: 10px; margin-top: 15px; overflow: hidden; }
        .waveform-img { width: 100%; height: auto; display: block; filter: saturate(1.5) brightness(1.2); }
        
        #status-bar { display: none; margin-right: 15px; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <h1 style="font-size: 2.5rem; letter-spacing: -1px;">🎙️ Sync Engine Pro</h1>
            <p style="color: #64748b; margin-top: 5px;">Advanced temporal alignment and emotional texture validation.</p>
            
            <div class="grid">
                <div class="drop-zone">
                    <h3 style="margin-bottom:10px;">Master Reference</h3>
                    <input type="file" id="mIn" style="display:none" onchange="updateName('mIn', 'mName')">
                    <button class="btn" style="background:#64748b" onclick="document.getElementById('mIn').click()">Choose Master</button>
                    <div id="mName" style="margin-top:10px; font-size: 12px; font-weight: 600;"></div>
                </div>
                <div class="drop-zone">
                    <h3 style="margin-bottom:10px;">Localized Dubs</h3>
                    <input type="file" id="dIn" multiple style="display:none" onchange="updateName('dIn', 'dName')">
                    <button class="btn" style="background:#64748b" onclick="document.getElementById('dIn').click()">Choose Dubs</button>
                    <div id="dName" style="margin-top:10px; font-size: 12px; font-weight: 600;"></div>
                </div>
            </div>

            <div style="text-align: right; display: flex; align-items: center; justify-content: flex-end;">
                <div id="status-bar">⚡ Analyzing Spectral Data...</div>
                <button id="runBtn" class="btn" onclick="runAnalysis()">Run Impact Analysis</button>
            </div>
        </div>

        <div id="results-area"></div>
    </div>

    <script>
        function updateName(id, target) {
            const files = document.getElementById(id).files;
            document.getElementById(target).innerText = files.length > 1 ? `${files.length} files selected` : files[0].name;
        }

        async function runAnalysis() {
            const mFile = document.getElementById('mIn').files[0];
            const dFiles = document.getElementById('dIn').files;
            if(!mFile || dFiles.length === 0) return alert("Please select both Master and Dub files.");

            const fd = new FormData();
            fd.append('reference', mFile);
            for(let f of dFiles) fd.append('comparison[]', f);

            const btn = document.getElementById('runBtn');
            const status = document.getElementById('status-bar');
            btn.disabled = true;
            status.style.display = 'block';

            try {
                const res = await fetch('/upload', { method: 'POST', body: fd });
                const data = await res.json();
                
                let html = `<h2 style="margin: 20px 0;">Analysis Results: ${data.reference}</h2>`;
                data.results.forEach(r => {
                    html += `
                    <div class="result-card">
                        <span class="badge ${r.needs_review ? 'badge-review' : 'badge-pass'}">
                            ${r.needs_review ? '⚠️ REVIEW' : '✅ PASSED'}
                        </span>
                        <h3 style="color: #0f172a;">${r.filename}</h3>
                        <p style="font-size: 12px; color: #64748b;">Duration: ${r.meta.duration}s | ${r.meta.sr}Hz</p>
                        
                        <div class="metric-row">
                            <div class="metric-box">
                                <div class="m-label">Temporal Offset</div>
                                <div class="m-value" style="color:${Math.abs(r.offset_ms) > 50 ? '#e11d48' : '#0f172a'}">${r.offset_ms}ms</div>
                            </div>
                            <div class="metric-box">
                                <div class="m-label">Lip-Flap Sync</div>
                                <div class="m-value">${r.lip_flap_sync}%</div>
                            </div>
                            <div class="metric-box">
                                <div class="m-label">Tone Lock</div>
                                <div class="m-value">${r.tone_lock}%</div>
                            </div>
                        </div>

                        <div class="waveform-container">
                            <img class="waveform-img" src="data:image/png;base64,${r.visual}">
                        </div>
                    </div>`;
                });
                document.getElementById('results-area').innerHTML = html;
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.disabled = false;
                status.style.display = 'none';
            }
        }
    </script>
</body>
</html>
