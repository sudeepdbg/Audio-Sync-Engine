<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Sync Checker Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: #f1f5f9; display: flex; justify-content: center; padding: 2rem; min-height: 100vh; }
        .container { max-width: 1100px; width: 100%; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 2.5rem; margin-bottom: 2rem; }
        h1 { font-size: 2.2rem; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        .subtitle { color: #64748b; margin-bottom: 2.5rem; font-size: 1.1rem; }
        
        .upload-section { display: flex; flex-wrap: wrap; gap: 2rem; }
        .upload-box { flex: 1 1 300px; background: #f8fafc; border-radius: 16px; padding: 2rem; border: 2px dashed #cbd5e1; transition: border-color 0.2s; }
        .upload-box:hover { border-color: #3b82f6; }
        .file-input-label { display: inline-block; background: white; border: 1px solid #cbd5e1; border-radius: 40px; padding: 0.7rem 1.5rem; cursor: pointer; margin-top: 10px; font-weight: 500; font-size: 0.9rem; transition: all 0.2s; }
        .file-input-label:hover { border-color: #3b82f6; color: #3b82f6; }
        input[type="file"] { display: none; }
        
        .primary-btn { background: #2563eb; color: white; border: none; border-radius: 40px; padding: 0.9rem 2.5rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .secondary-btn { background: #64748b; color: white; border: none; border-radius: 40px; padding: 0.9rem 1.8rem; font-weight: 600; cursor: pointer; }
        
        .result-item { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 2rem; margin-top: 2rem; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .status-badge { padding: 0.4rem 1.2rem; border-radius: 30px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; float: right; }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-review { background: #fee2e2; color: #991b1b; }
        
        /* Updated Grid for 4 Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
        .stat-card { background: #f8fafc; padding: 1rem; border-radius: 12px; border: 1px solid #f1f5f9; }
        .stat-label { color: #64748b; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.25rem; }
        .stat-value { color: #1e293b; font-size: 1.1rem; font-weight: 700; }
        
        .confidence-bg { background: #e2e8f0; height: 6px; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .confidence-fill { height: 100%; background: #3b82f6; border-radius: 10px; transition: width 0.5s ease-in-out; }
        
        .waveform-img { width: 100%; margin-top: 1.5rem; border-radius: 12px; border: 1px solid #e2e8f0; background: #fff; }
        
        .properties-container { margin: 1.5rem 0; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .prop-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .prop-table th { background: #f8fafc; color: #64748b; font-weight: 600; text-align: left; padding: 10px 15px; border-bottom: 1px solid #e2e8f0; }
        .prop-table td { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .prop-master { color: #2563eb; font-weight: 600; background: #f0f7ff; }

        #loading { display: none; align-items: center; gap: 0.75rem; color: #2563eb; font-weight: 700; }
        .spinner { width: 20px; height: 20px; border: 3px solid #bfdbfe; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .issue-box { background: #fff1f2; border: 1px solid #fda4af; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
        .issue-title { color: #9f1239; font-size: 0.9rem; font-weight: 700; display: block; margin-bottom: 5px; }
        .issue-list { color: #be123c; font-size: 0.85rem; padding-left: 1.2rem; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎧 Audio Sync Checker</h1>
            <p class="subtitle">Analyze drift, temporal alignment, and content DNA via signal processing.</p>
            
            <div class="upload-section">
                <div class="upload-box">
                    <h3>📌 Reference (Master)</h3>
                    <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 1rem;">Primary audio track (e.g. English Master)</p>
                    <label for="refFile" class="file-input-label">Choose File</label>
                    <input type="file" id="refFile" accept=".wav,.mp3,.m4a,.flac,.aac,.mp4">
                    <div id="refFileList" style="margin-top: 12px; font-size: 0.9rem; color: #3b82f6; font-weight: 500;"></div>
                </div>
                
                <div class="upload-box">
                    <h3>🔁 Comparison (Dubs)</h3>
                    <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 1rem;">Target tracks to validate (Multi-file support)</p>
                    <label for="compFiles" class="file-input-label">Choose Files</label>
                    <input type="file" id="compFiles" multiple accept=".wav,.mp3,.m4a,.flac,.aac,.mp4">
                    <div id="compFileList" style="margin-top: 12px; font-size: 0.9rem; color: #3b82f6; font-weight: 500;"></div>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-top: 2.5rem; gap: 1rem; align-items: center;">
                <div id="loading"><div class="spinner"></div> Analysing Signals...</div>
                <button class="secondary-btn" onclick="clearCache()">🗑 Clear Cache</button>
                <button class="primary-btn" id="checkBtn" onclick="uploadFiles()">▶ Check Sync</button>
            </div>
        </div>

        <div id="results" class="card" style="display: none; padding-top: 1rem;"></div>
    </div>

    <script>
        document.getElementById('refFile').addEventListener('change', function() {
            document.getElementById('refFileList').innerText = this.files[0]?.name || '';
        });
        document.getElementById('compFiles').addEventListener('change', function() {
            document.getElementById('compFileList').innerText = `${this.files.length} track(s) ready for analysis`;
        });

        async function clearCache() {
            if (!confirm("Clear all session data and fingerprints?")) return;
            try {
                const res = await fetch('/clear_cache', { method: 'POST' });
                const data = await res.json();
                alert(data.status);
                location.reload(); 
            } catch (e) { alert("Failed to clear cache."); }
        }

        async function uploadFiles() {
            const refInput = document.getElementById('refFile');
            const compInput = document.getElementById('compFiles');
            if (!refInput.files.length || !compInput.files.length) return alert('Inputs Required');

            const formData = new FormData();
            formData.append('reference', refInput.files[0]);
            for (let f of compInput.files) formData.append('comparison[]', f);

            document.getElementById('loading').style.display = 'flex';
            document.getElementById('checkBtn').disabled = true;
            document.getElementById('results').style.display = 'none';

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                if (!res.ok) throw new Error("Server error.");
                const data = await res.json();
                displayResults(data);
            } catch (e) {
                alert(e.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('checkBtn').disabled = false;
            }
        }

        function displayResults(data) {
            const container = document.getElementById('results');
            container.style.display = 'block';
            let html = `<h2 style="margin-bottom:1.5rem; color: #1e293b;">Analysis Report: <span style="color: #2563eb;">${data.reference}</span></h2>`;
            
            data.results.forEach(r => {
                const isFail = r.needs_review;
                const driftColor = r.drift_ms > 30 ? '#ef4444' : '#10b981';
                
                let issuesHtml = r.issues && r.issues.length > 0 ? `
                    <div class="issue-box">
                        <strong class="issue-title">⚠️ Detected Discrepancies:</strong>
                        <ul class="issue-list">${r.issues.map(i => `<li>${i}</li>`).join('')}</ul>
                    </div>` : '';
                
                html += `
                    <div class="result-item">
                        <span class="status-badge ${isFail ? 'status-review' : 'status-ok'}">${isFail ? 'Attention Required' : 'Sync Match OK'}</span>
                        <h4 style="margin-bottom: 1.5rem; color: #334155;">${r.filename}</h4>
                        
                        ${issuesHtml}

                        <div class="properties-container">
                            <table class="prop-table">
                                <thead>
                                    <tr><th>Spec</th><th>Reference</th><th>Comparison</th></tr>
                                </thead>
                                <tbody>
                                    <tr><td>Sample Rate</td><td class="prop-master">${r.ref_meta.sr}</td><td>${r.comp_meta.sr}</td></tr>
                                    <tr><td>Duration</td><td class="prop-master">${r.ref_meta.duration_str}</td><td>${r.comp_meta.duration_str}</td></tr>
                                    <tr><td>Channels</td><td class="prop-master">${r.ref_meta.channels}</td><td>${r.comp_meta.channels}</td></tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Start Offset</div>
                                <div class="stat-value">${r.offset_ms}ms</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">End Offset</div>
                                <div class="stat-value">${r.end_offset_ms}ms</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Total Drift</div>
                                <div class="stat-value" style="color: ${driftColor}">${r.drift_ms}ms</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Content DNA</div>
                                <div class="stat-value">${r.match_confidence}%</div>
                                <div class="confidence-bg"><div class="confidence-fill" style="width: ${r.match_confidence}%"></div></div>
                            </div>
                        </div>

                        <img class="waveform-img" src="data:image/png;base64,${r.visual}">
                    </div>`;
            });
            
            container.innerHTML = html;
            container.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
