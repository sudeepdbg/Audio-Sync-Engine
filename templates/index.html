<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Engine Pro | Studio QC</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --danger: #ef4444; --success: #22c55e; }
        * { box-sizing: border-box; margin: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { margin-bottom: 30px; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .config-card { background: var(--card); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .btn { background: var(--brand); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        #summarySection { display:none; background:white; padding:20px; border-radius:12px; margin-bottom:20px; border-left:8px solid var(--brand); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .result-card { background: var(--card); border-radius: 16px; padding: 24px; margin-bottom: 32px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .stat-box { background: #f1f5f9; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: 700; color: var(--brand); }
        .stat-label { font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: 800; }
        .meta-table { width: 100%; border-collapse: collapse; display: none; margin: 10px 0 20px 0; }
        .meta-table th, .meta-table td { border: 1px solid #e2e8f0; padding: 10px; font-size: 13px; }
        .mismatch { background: #fee2e2; color: #b91c1c; font-weight: 800; }
        .chart-container { height: 350px; width: 100%; border-radius: 8px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><h1>🎧 Sync Engine Pro</h1><p>Professional Temporal Alignment & Broadcast QC</p></div>
        </div>

        <div class="config-card">
            <div style="flex:1"><label style="font-size:11px; font-weight:800;">REFERENCE</label><input type="file" id="refFile"></div>
            <div style="flex:1"><label style="font-size:11px; font-weight:800;">DUBS</label><input type="file" id="compFiles" multiple></div>
            <div style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="vocalLogic" checked><label style="font-size:13px; font-weight:600">Vocal Filter & LUFS</label></div>
            <button class="btn" id="runBtn" onclick="runAnalysis()">Run QC</button>
        </div>

        <div id="summarySection">
            <h2 style="margin:0; font-size:18px;">QC Executive Summary</h2>
            <div id="summaryContent" style="display:flex; gap:40px; margin-top:10px;"></div>
        </div>

        <div id="resultsList"></div>
    </div>

    <script>
        async function runAnalysis() {
            const ref = document.getElementById('refFile').files[0];
            const comps = document.getElementById('compFiles').files;
            if(!ref || comps.length === 0) return alert("Select files.");

            const fd = new FormData();
            fd.append('reference', ref);
            for (let f of comps) fd.append('comparison[]', f);
            fd.append('vocal_logic', document.getElementById('vocalLogic').checked);

            document.getElementById('resultsList').innerHTML = 'Processing...';

            const res = await fetch('/upload', { method: 'POST', body: fd });
            const data = await res.json();
            renderResults(data);
        }

        function renderResults(data) {
            const container = document.getElementById('resultsList');
            const summary = document.getElementById('summarySection');
            const summaryContent = document.getElementById('summaryContent');
            container.innerHTML = '';
            
            summary.style.display = 'block';
            let passedCount = data.results.filter(r => r.status === 'PASS').length;
            summaryContent.innerHTML = `
                <span><strong>Processed:</strong> ${data.results.length}</span>
                <span><strong>Passed:</strong> <span style="color:var(--success)">${passedCount}</span></span>
                <span><strong>Failed:</strong> <span style="color:var(--danger)">${data.results.length - passedCount}</span></span>
            `;

            data.results.forEach((r, i) => {
                const div = document.createElement('div');
                div.className = 'result-card';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="margin:0">${r.filename}</h3>
                        <span style="padding:4px 12px; border-radius:20px; font-weight:800; font-size:12px; background:${r.status === 'PASS' ? '#dcfce7' : '#fee2e2'}; color:${r.status === 'PASS' ? '#166534' : '#991b1b'};">
                            ${r.status}
                        </span>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="stat-label">Start Offset</span><span class="stat-val">${r.offset_ms}ms</span></div>
                        <div class="stat-box"><span class="stat-label">Total Drift</span><span class="stat-val">${r.total_drift_ms}ms</span></div>
                        <div class="stat-box"><span class="stat-label">DNA Match</span><span class="stat-val">${r.dna_match}%</span></div>
                        <div class="stat-box"><span class="stat-label">Phase Health</span><span class="stat-val">${r.phase}</span></div>
                    </div>
                    <button style="margin-bottom:10px" onclick="const t=document.getElementById('t-${i}'); t.style.display=t.style.display==='table'?'none':'table'">+ Technical Specs</button>
                    <table class="meta-table" id="t-${i}">
                        <tr><th>Property</th><th>Master Reference</th><th>Comparison Dub</th></tr>
                        <tr class="${r.chan_mismatch ? 'mismatch' : ''}"><td>Channels</td><td>${r.ref_meta.channel_label}</td><td>${r.comp_meta.channel_label}</td></tr>
                        <tr><td>Loudness</td><td>-</td><td>${r.levels.lufs}</td></tr>
                        <tr><td>Peak</td><td>-</td><td>${r.levels.peak}</td></tr>
                    </table>
                    <div id="chart-${i}" class="chart-container"></div>
                `;
                container.appendChild(div);

                Plotly.newPlot(`chart-${i}`, [
                    { y: r.wave_a, name: 'Master (Start)', line: {color:'#3b82f6', width:1}, opacity:0.5 },
                    { y: r.wave_r, name: 'Dub (Start)', line: {color:'#f59e0b', width:1}, opacity:0.8 }
                ], { margin: { t: 40, b: 30, l: 40, r: 20 }, legend: { orientation: 'h', y: 1.15 } });
            });
        }
    </script>
</body>
</html>
